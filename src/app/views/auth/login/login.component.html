<div class="auth-full-height d-flex flex-row align-items-center">
    <div class="container">
       <div class="row justify-content-center">
           <div class="col-md-4">
                <div class="card">
                    <div class="card-body">
                        <div class="m-2">
                            <div class="d-flex justify-content-center mt-3">
                                <logo class="text-center" logoType="fold"></logo>
                            </div>
                            <div class="text-center mt-3">
                                <h3 class="fw-bolder">{{'AU.sign_in' |translate}}</h3>
                                <p class="text-muted">{{'AU.sign_in_msg' |translate}}</p>
                                <dropdown dropdownClass="header-nav-item-select" (click)="navI18n.toggle($event)">
                                    <div class="toggle-wrapper">
                                        <avatar [size]="22" [src]="'/assets/images/thumbs/' + currentLang + '.png'"></avatar>
                                    </div>
                                    <dropdown-menu #navI18n alignment="right">
                                        <a href="javascript:void(0)" dropdownItem *ngFor="let language of languageList" (click)="setLanguage(language.key)">
                                            <div class="d-flex align-items-center">
                                                <avatar [size]="18" [src]="'/assets/images/thumbs/' + language.key + '.png'"></avatar>
                                                <span class="ms-2">{{language.lang}}</span>
                                            </div>
                                        </a>
                                    </dropdown-menu>
                                </dropdown>
                            </div>


                            

                            <login-form></login-form>

                            <!-- <div class="text-center mt-4">
                                <p class="text-muted">Don't have an account yet? <a href="/auth/register-1">Sign Up</a></p>
                            </div> -->
                        </div>
                    </div>
                </div>
           </div>
       </div> 
    </div>
</div>
