<div class="container-fluid p-0" style="width: 98%;">
    <div class="card">
      <div class="card-body">
        <div class="mb-3 d-flex justify-content-between flex-wrap">
          <h4 class="mb-2 fw-bolder">{{'LG.activity_logs' | translate}}</h4>
         
  
          <div class="col-md-7"></div>
          <div class="mb-2 ">
              <div class="input-group">
                  <input class="form-control"  type="text" placeholder="{{ 'LG.search' | translate }}" [(ngModel)]="searchTerm" (keydown.enter)="search()">
                  <button class="btn btn-primary btn-icon" type="button" id="button-search-addon" (click)="search()"><i class="feather icon-search"></i></button>
              </div>
          </div>
          <div class="md-2">
            <button type="button" class="btn btn-outline-danger btn-icon-text mb-1" (click)="delete()">
              {{ 'UL.delete' | translate }}
</button>
        </div>
          
  
  
  
  
        </div>
  
        <div class="table-responsive">
          <ngx-datatable #table 
          [rows]="logsData" 
          [columnMode]="columnMode" 
          [headerHeight]="50" 
          [footerHeight]="50"
          [selected]="selected" 
          [selectionType]="SelectionType.checkbox"
          (select)="onSelect($event)"
          [rowHeight]="rowHeight" 
          [scrollbarH]="true">

          <ngx-datatable-column
                        [width]="40"
                        [sortable]="false"
                        [canAutoResize]="false"
                        [draggable]="false"
                        [resizeable]="false"
                    >
                        <ng-template
                            ngx-datatable-header-template
                            let-value="value"
                            let-allRowsSelected="allRowsSelected"
                            let-selectFn="selectFn"
                        >
                            <div class="form-check mb-0">
                                <input class="form-check-input" type="checkbox" [checked]="allRowsSelected" (change)="selectFn(!allRowsSelected)" />
                            </div>
                        </ng-template>
                        <ng-template
                            ngx-datatable-cell-template
                            let-value="value"
                            let-isSelected="isSelected"
                            let-onCheckboxChangeFn="onCheckboxChangeFn"
                        >
                            <div class="form-check mb-0">
                                <input class="form-check-input" type="checkbox" [checked]="isSelected" (change)="onCheckboxChangeFn($event)" />
                            </div>
                        </ng-template>
                    </ngx-datatable-column>
  
            <!-- ID Column -->
            <ngx-datatable-column name="{{'LG.id' | translate}}" [width]="50">
              <ng-template let-row="row" let-value="value" ngx-datatable-cell-template>
                <div class="d-flex align-items-center">
                  <div class="text-dark fw-bold">{{row['id']}}</div>
                </div>
              </ng-template>
            </ngx-datatable-column>
  
            <!-- First Name Column -->
            <ngx-datatable-column name="{{'LG.model_name' | translate}}" [width]="120">
              <ng-template let-row="row" let-value="value" ngx-datatable-cell-template>
                <div class="text-dark fw-bold">{{row['model_name']}}</div>
              </ng-template>
            </ngx-datatable-column>
  
            <!-- Last Name Column -->
            <ngx-datatable-column name="{{'LG.action_type' | translate}}" [width]="120">
              <ng-template let-row="row" let-value="value" ngx-datatable-cell-template>
                <div class="text-dark fw-bold">{{row['action_type']}}</div>
              </ng-template>
            </ngx-datatable-column>
  
            <!-- Father Name Column -->
            <ngx-datatable-column name="{{'LG.ip_address' | translate}}" [width]="130">
              <ng-template let-row="row" let-value="value" ngx-datatable-cell-template>
                <div class="text-dark fw-bold">{{row['ip_address']}}</div>
              </ng-template>
            </ngx-datatable-column>
  
            <!-- Grandfather Name Column -->
            <ngx-datatable-column name="{{'LG.description' | translate}}" [width]="130">
              <ng-template let-row="row" let-value="value" ngx-datatable-cell-template>
                <div class="text-dark fw-bold">{{row['description']}}</div>
              </ng-template>
            </ngx-datatable-column>
  
           
  
           
  
         
  
            
  
            <!-- Actions Column -->
            <ngx-datatable-column [sortable]="false" cellClass="allow-overflow" [width]="50" name="{{'GL.actions' | translate}}">
              <ng-template let-row="row" let-value="value" ngx-datatable-cell-template>
                <dropdown dropdownClass="d-block ms-3" (click)="action.toggle($event)">
                  <a class="px-2" href="javascript:void(0)">
                    <i class="feather icon-more-vertical"></i>
                  </a>
                  <dropdown-menu #action alignment="right">
                    <a  dropdownItem (click)="viewlogs(row)" class="cursor-pointer">
                      <div class="d-flex align-items-center ">
                        <i class="feather icon-eye"></i>
                        <span class="ms-2">{{'LG.view' | translate}}</span>
                      </div>
                    </a>
                    
                  </dropdown-menu>
                </dropdown>
              </ng-template>
            </ngx-datatable-column>
  
          </ngx-datatable>
  
          <div class="card-footer" *ngIf="showPagination">
            <div class="row">
                <div class="col-md-4">
                    <div class="d-flex align-items-center"></div>
                </div>
                <div class="col-md-4">
                    <nav aria-label="Page navigation">
                        <ul class="pagination">
                            <li class="page-item" [ngClass]="{disabled: currentPage === 1}">
                                <a class="page-link" style="cursor: pointer;" (click)="firstPage()"><svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" class="feather feather-chevrons-left"><polyline points="11 17 6 12 11 7"></polyline><polyline points="18 17 13 12 18 7"></polyline></svg></a>
                            </li>
                            <li class="page-item" [ngClass]="{ disabled: currentPage === 1 }">
                                <a class="page-link" style="cursor: pointer;" (click)="previous()">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" class="feather feather-chevron-left">
                          <polyline points="15 18 9 12 15 6"></polyline>
                        </svg>
                                </a>
                            </li>
  
                            <li *ngFor="let page of getPaginationArray()" class="page-item" [ngClass]="{ active: currentPage === page }">
                                <a *ngIf="page !== '...'" class="page-link" style="cursor: pointer;" (click)="setPage(page)">{{ page }}</a>
                                <span *ngIf="page === '...'" class="page-link">{{ page }}</span>
                            </li>
  
                            <li class="page-item" [ngClass]="{ disabled: currentPage === totalPages }">
                                <a class="page-link" style="cursor: pointer;" (click)="next()">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" class="feather feather-chevron-right">
                          <polyline points="9 18 15 12 9 6"></polyline>
                        </svg>
                                </a>
                            </li>
                            <li class="page-item" [ngClass]="{disabled: currentPage === totalPages}">
                                <a class="page-link" style="cursor: pointer;" (click)="lastPage()">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" class="feather feather-chevrons-right"><polyline points="13 17 18 12 13 7"></polyline><polyline points="6 17 11 12 6 7"></polyline></svg></a>
                            </li>
  
                        </ul>
                    </nav>
                </div>
                <div class="col-md-4" style="padding-left: 255px;">
                    <select class="form-select mb-3" aria-label="Default select example" (change)="itemsPerPage($event)">
                  <option selected="">Items Per Page</option>
                  <option *ngFor="let size of pageSizeOptions">{{size}}</option>
                </select>
                </div>
            </div>
  </div>
        </div>
  
  
      </div>
    </div>
  </div>
