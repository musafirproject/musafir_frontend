<div class="auth-full-height container d-flex flex-column justify-content-center">
    <div class="row justify-content-center">
        <div class="col-md-9">
            <div class="card row mx-0 flex-row overflow-hidden">
                <div class="col-md-4 bg-size-cover d-flex align-items-center p-4" style="background-image: url('assets/images/others/bg-3.jpg');">
                    <div>
                        <div class="mb-5">
                            <!-- <logo [white]="true" [height]="50"></logo> -->
                            <img src="assets/images/logo/logo-fold.png" width="50" height="50"  alt="">
                        </div>
                        <h3 class="text-white">Reset Your Password</h3>
                        <p class="text-white mt-4 mb-5 o-75">Need a fresh start? Just fill out the form below to reset your password and get back on track!</p>
                    </div>
                </div>
                <div class="col-md-8 px-0">
                    <div class="card-body">
                        <div class="my-5 mx-auto" style="max-width: 350px;">
                            <div class="mb-3">
                                <h3 class="mb-3">Reset Password</h3>
                                <form [formGroup]="formGroup" (validSubmit)="changePassword()">
                                    <div class="form-group mb-3">
                                        <label class="form-label">Password</label>
                                        <input 
                                            type="password" 
                                            class="form-control no-validation-icon no-success-validation" 
                                            formControlName="new_password"
                                        >
                                    </div>
                                    <div class="form-group mb-3">
                                        <label class="form-label">Confirm Password</label>
                                        <input 
                                            type="password" 
                                            class="form-control no-validation-icon no-success-validation" 
                                            formControlName="confirm_password"
                                        >
                                        <ng-container *ngIf="formGroup.get('confirm_password').hasError('confirm')">
                                            <span class="invalid-feedback">Password not match</span>
                                        </ng-container>
                                    </div>
                                
                                
                                    <button class="btn btn-primary d-block w-100" type="submit" (click)="changePassword()" >Send</button>
                                    <br>
                                </form>
                                
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
