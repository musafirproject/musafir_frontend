<div class="card h-100 shadow-sm">
  <div class="card-body">
    <div *ngIf="loading" class="placeholder-block" style="height:220px;"></div>

    <div *ngIf="!loading && error" class="alert alert-warning mb-0">
      Failed to load journey.
    </div>

    <div *ngIf="!loading && !error && options">
      <apx-chart
        [series]="options.series"
        [chart]="options.chart"
        [plotOptions]="options.plotOptions"
        [xaxis]="options.xaxis"
        [yaxis]="options.yaxis"
        [dataLabels]="options.dataLabels"
        [stroke]="options.stroke"
        [fill]="options.fill"
        [tooltip]="options.tooltip"
        [legend]="options.legend">
      </apx-chart>
    </div>

    <div *ngIf="!loading && !error && !options" class="text-muted small">
      No stays to display.
    </div>
  </div>
</div>
