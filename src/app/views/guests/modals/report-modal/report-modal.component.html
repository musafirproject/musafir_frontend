<div style="z-index: 1050 !important;">
    <div class="container-fluid">
        <div class="row">
            <div class="col-lg-12">
                <div class="card">
                    <div class="card-header mt-2">
                        <h4 class="text-primary">{{'RE.guest_report' | translate}}</h4>
                    </div>
                    <div class="card-body">
                        <h5 class="text-primary text-center">{{'RE.select_criteria' |translate}}</h5>
                        <form [formGroup]="guestForm">
                            <div class="form-group mb-3">
                                <label class="control-label">{{'RE.start_date' |translate}}</label>
                                <input type="text"
                                placeholder="{{'UC.datepicker'|translate}}"
                                class="form-control"
                                formControlName="start_date"
                                bsDatepicker>                            </div>
                            <div class="form-group mb-3">
                                <label class="control-label">{{'RE.end_date' |translate}}</label>
                                <input type="text"
                                placeholder="{{'UC.datepicker'|translate}}"
                                class="form-control"
                                formControlName="end_date"
                                bsDatepicker>
                            </div>


                           
                            
                            <div  class="form-group mb-3" [customErrorMessages]="nameError">
                                <label class="control-label">{{'RE.select_hotel' | translate}}</label>
                                <ng-select  class="mt-2" [items]="hotels" bindLabel="title" bindValue="id"
                                    formControlName="guest_hotel" placeholder="Hotel" >
                                </ng-select>
                            </div>
                           
                            
                           

                            <div class="form-group mb-3" [customErrorMessages]="nameError">
                                <label class="control-label">{{'RE.select_residence' | translate}}</label>
                                <select class="form-select"  formControlName="guest_resident">
                                    <option value="" disabled selected>{{'UC.residence' | translate}}</option>
                                    <option *ngFor="let type of residencies" [value]="type.key">{{
                                        currentLang == 'en_US' ? type.value : currentLang == 'ps_AF' ? type.ps : type.dr }}</option>
                                </select>

                            
                            </div>
                            
                           



                            <div class="form-group mb-3" [customErrorMessages]="nameError">
                                <label class="control-label">{{'RE.select_format' |translate}}</label>
                                <ng-select  class="mt-2" [items]="reportType" bindLabel="value" bindValue="key"
                                    formControlName="report_format" placeholder="Report Format" [(ngModel)]="selectedReport">
                                </ng-select>
                            </div>
                            <div class="mt-3">
                                <button class="btn btn-light me-2" type="button" (click)="onReset()">{{'RE.reset' |translate}}</button>
                                <button class="btn btn-outline-primary me-2" (click)="getUserReport()">{{'RE.download' | translate}}</button>
                                <button class="btn btn-outline-danger" (click)="close()">{{'RE.close' |translate}}</button>
                            </div>
                        </form>
                    </div>
                    <div class="card-footer">
                        <div class="row">
                            <div class="col-md-7"></div>
                            <div class="col-md-5 mb-2">
                                
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
