<dropdown dropdownClass="header-nav-item-select nav-profile" (click)="navProfile.toggle($event)">
    <div class="toggle-wrapper d-flex align-items-center">
        <avatar [size]="35" src="{{currentUser?.image}}"></avatar>
        <span class="fw-bold mx-1">{{currentUser?.first_name}} {{currentUser?.last_name}}</span>
        <i class="feather icon-chevron-down"></i>
    </div>
    <dropdown-menu #navProfile alignment="right">
        <div class="nav-profile-header">
            <div class="d-flex align-items-center">
                <avatar src="{{currentUser?.image}}"></avatar>
                <div class="d-flex flex-column ms-1">
                    <span class="fw-bold text-dark">{{currentUser?.first_name}} {{currentUser?.last_name}}</span>
                    <span class="font-size-sm">{{currentUser?.email}} </span>
                </div>
            </div>
        </div>
        <a href="javascript:void(0)" dropdownItem *ngFor="let menuItem of profileMenuList">
            <div (click)="profileMenu(menuItem?.item)" class="d-flex align-items-center gap-2">
                <i class="font-size-lg" [ngClass]="menuItem.icon"></i>
                <span>{{('PRMENU.' + menuItem.item) | translate}}</span>
            </div>
        </a>
    </dropdown-menu>
</dropdown>
